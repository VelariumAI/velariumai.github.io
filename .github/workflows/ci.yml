name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ hashFiles('pyproject.toml') }}
      - run: pip install ruff
      - run: ruff check src/ tests/ --output-format=github
      - run: ruff format --check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: mypy-${{ hashFiles('pyproject.toml') }}
      - run: pip install mypy -e .[dev]
      - run: mypy src/vcse/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # pre-existing type debt; advisory only

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
      - run: pip install -e .[dev] pytest-cov
      - run: >
          python -m pytest
          --tb=short
          --cov=vcse
          --cov-report=term-missing:skip-covered
          --cov-report=xml
          -q
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: security-${{ hashFiles('pyproject.toml') }}
      - run: pip install bandit pip-audit -e .
      - name: bandit (SAST)
        run: bandit -r src/vcse/ -c pyproject.toml -q
      - name: pip-audit (dependency CVEs)
        run: pip-audit --requirement <(pip freeze) --skip-editable -f json -o pip-audit.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit.json

  gauntlet:
    name: Gauntlet (false_verified=0 gate)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: gauntlet-${{ hashFiles('pyproject.toml') }}
      - run: pip install -e .[dev]
      - name: Run gauntlet
        run: >
          vcse gauntlet benchmarks/gauntlet/
          --search mcts
          --ts3
          --index
          --json
          > gauntlet-report.json
      - name: Assert false_verified_count=0
        run: |
          python - <<'EOF'
          import json, sys
          data = json.load(open("gauntlet-report.json"))
          fvc = data.get("false_verified_count", -1)
          status = data.get("status", "UNKNOWN")
          print(f"status: {status}")
          print(f"false_verified_count: {fvc}")
          print(f"total_cases: {data.get('total_cases', '?')}")
          if fvc != 0:
              print(f"FAIL: false_verified_count={fvc}, must be 0", file=sys.stderr)
              sys.exit(1)
          if status != "PASSED":
              print(f"FAIL: gauntlet status={status}", file=sys.stderr)
              sys.exit(1)
          print("OK")
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gauntlet-report
          path: gauntlet-report.json

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: vcse:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  all-checks:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security, gauntlet, docker]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          failed = [name for name, info in data.items() if info['result'] not in ('success', 'skipped')]
          if failed:
              print('Failed jobs:', failed, file=sys.stderr)
              sys.exit(1)
          print('All checks passed')
          "
