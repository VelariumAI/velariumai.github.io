name: Sync Project Metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"
  repository_dispatch:
    types: [project-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh projects.json from GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update_projects.py

      - name: Commit changes if any
        run: |
          if git diff --quiet; then
            echo "No metadata changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects.json
          git commit -m "chore: sync project metadata"
          git push
