repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast subset)
        entry: python -m pytest tests/ -q --tb=short -x --ignore=tests/test_cake_pipeline.py --ignore=tests/test_mcts_search.py
        language: system
        pass_filenames: false
        always_run: false
        stages: [pre-push]
